spring.application.name=microservice-mongodb-morphia-java
server.port=8086

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# MongoDB / Morphia configuration
mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
mongodb.database=${MONGODB_DATABASE:morphia_tpch_relational}

# Disable Spring Boot's autoconfigured MongoDB so Morphia manages the connection
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# TPC-H dataset path — matches the unzip destination in the Dockerfile
# (/data/tpch-data-small/ after: unzip tpch-data-small.zip -d /data)
tpch.data.path=${TPCH_DATA_PATH:/data/tpch-data-small}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Feign read timeout — JMH runs can take several minutes
spring.cloud.openfeign.client.config.default.read-timeout=600000
