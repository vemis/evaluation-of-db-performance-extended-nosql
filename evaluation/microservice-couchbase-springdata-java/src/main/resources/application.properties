spring.application.name=microservice-couchbase-springdata-java
server.port=8087

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Couchbase connection (Spring Boot auto-config)
spring.couchbase.connection-string=${COUCHBASE_HOST:localhost}
spring.couchbase.username=${COUCHBASE_USER:Administrator}
spring.couchbase.password=${COUCHBASE_PASSWORD:password}
spring.data.couchbase.bucket-name=bucket-main

# TPC-H dataset path — matches the unzip destination in the Dockerfile
tpch.data.path=${TPCH_DATA_PATH:/data/tpch-data-small}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Feign read timeout — JMH runs can take several minutes
spring.cloud.openfeign.client.config.default.read-timeout=600000
