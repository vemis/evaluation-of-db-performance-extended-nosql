spring.application.name=microservice-mongodb-springdata-java
server.port=8088

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# MongoDB / Spring Data configuration
mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
mongodb.database=${MONGODB_DATABASE:springdata_mongodb_tpch}

# TPC-H dataset path
tpch.data.path=${TPCH_DATA_PATH:/data/tpch-data-small}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Feign read timeout — JMH runs can take several minutes
spring.cloud.openfeign.client.config.default.read-timeout=600000
