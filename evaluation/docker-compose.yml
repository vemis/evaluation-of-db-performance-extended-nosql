services:
  db:
    build:
      context: .
      dockerfile: ./database/mysql/Dockerfile
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql/mysql_initial.sql:/docker-entrypoint-initdb.d/initial.sql

  mongodb:
    build:
      context: .
      dockerfile: ./database/mongodb/Dockerfile
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  couchbase:
    build:
      context: .
      dockerfile: ./database/couchbase/Dockerfile
    container_name: couchbase
    restart: unless-stopped
    environment:
      COUCHBASE_USER: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    ports:
      - "8091:8091"
      - "8092:8092"
      - "8093:8093"
      - "8094:8094"
      - "8095:8095"
      - "8096:8096"
      - "11210:11210"
      - "11211:11211"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u ${COUCHBASE_USER}:${COUCHBASE_PASSWORD} http://localhost:8091/pools/default/buckets/bucket-main && curl -sf http://localhost:8093/admin/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    volumes:
      - couchbase_data:/opt/couchbase/var

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"

  microservice-mysql-springdatajpa:
    build:
      context: .
      dockerfile: microservice-mysql-springdatajpa/Dockerfile
    container_name: ms-mysql-springdatajpa
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  microservice-mysql-jdbc:
    build:
      context: .
      dockerfile: microservice-mysql-jdbc/Dockerfile
    container_name: ms-mysql-jdbc
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  microservice-mysql-mybatis:
    build:
      context: .
      dockerfile: microservice-mysql-mybatis/Dockerfile
    container_name: ms-mysql-mybatis
    restart: unless-stopped
    mem_limit: 4096m
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8082:8080"
    depends_on:
      db:
        condition: service_healthy

  microservice-mysql-cayenne:
    build:
      context: .
      dockerfile: microservice-mysql-cayenne/Dockerfile
    container_name: ms-mysql-cayenne
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8083:8080"
    depends_on:
      db:
        condition: service_healthy

  microservice-mysql-jooq:
    build:
      context: .
      dockerfile: microservice-mysql-jooq/Dockerfile
    container_name: ms-mysql-jooq
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8084:8080"
    depends_on:
      db:
        condition: service_healthy

  microservice-mysql-ebean:
    build:
      context: .
      dockerfile: microservice-mysql-ebean/Dockerfile
    container_name: ms-mysql-ebean
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8085:8080"
    depends_on:
      db:
        condition: service_healthy

  microservice-mongodb-morphia-java-loader:
    build:
      context: .
      dockerfile: microservice-mongodb-morphia-java/Dockerfile
    container_name: ms-mongodb-morphia-java-loader
    restart: "no"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: morphia_tpch_relational
      TPCH_DATA_PATH: /data/tpch-data-small
    entrypoint:
      - java
      - -Xms256m
      - -Xmx6g
      - -XX:MinHeapFreeRatio=5
      - -XX:MaxHeapFreeRatio=10
      - -jar
      - /app/app.jar
      - --loader.mode=true
      - --spring.main.web-application-type=none
      - --eureka.client.enabled=false
    depends_on:
      mongodb:
        condition: service_started

  microservice-mongodb-morphia-java:
    build:
      context: .
      dockerfile: microservice-mongodb-morphia-java/Dockerfile
    container_name: ms-mongodb-morphia-java
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: morphia_tpch_relational
      EUREKA_URL: http://eureka-server:8761/eureka
      TPCH_DATA_PATH: /data/tpch-data-small
    ports:
      - "8086:8086"
    depends_on:
      mongodb:
        condition: service_started
      eureka-server:
        condition: service_started
      microservice-mongodb-morphia-java-loader:
        condition: service_completed_successfully

  microservice-mongodb-springdata-java-loader:
    build:
      context: .
      dockerfile: microservice-mongodb-springdata-java/Dockerfile
    container_name: ms-mongodb-springdata-java-loader
    restart: "no"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: springdata_mongodb_tpch
      TPCH_DATA_PATH: /data/tpch-data-small
    entrypoint:
      - java
      - -Xms256m
      - -Xmx6g
      - -XX:MinHeapFreeRatio=5
      - -XX:MaxHeapFreeRatio=10
      - -jar
      - /app/app.jar
      - --loader.mode=true
      - --spring.main.web-application-type=none
      - --eureka.client.enabled=false
    depends_on:
      mongodb:
        condition: service_started

  microservice-mongodb-springdata-java:
    build:
      context: .
      dockerfile: microservice-mongodb-springdata-java/Dockerfile
    container_name: ms-mongodb-springdata-java
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: springdata_mongodb_tpch
      EUREKA_URL: http://eureka-server:8761/eureka
      TPCH_DATA_PATH: /data/tpch-data-small
    ports:
      - "8088:8088"
    depends_on:
      mongodb:
        condition: service_started
      eureka-server:
        condition: service_started
      microservice-mongodb-springdata-java-loader:
        condition: service_completed_successfully

  microservice-couchbase-springdata-java-loader:
    build:
      context: .
      dockerfile: microservice-couchbase-springdata-java/Dockerfile
    container_name: ms-couchbase-springdata-java-loader
    restart: "no"
    environment:
      COUCHBASE_HOST: couchbase
      COUCHBASE_USER: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      TPCH_DATA_PATH: /data/tpch-data-small
    entrypoint:
      - java
      - -Xms256m
      - -Xmx6g
      - -XX:MinHeapFreeRatio=5
      - -XX:MaxHeapFreeRatio=10
      - -jar
      - /app/app.jar
      - --loader.mode=true
      - --spring.main.web-application-type=none
      - --eureka.client.enabled=false
    depends_on:
      couchbase:
        condition: service_healthy

  microservice-couchbase-springdata-java:
    build:
      context: .
      dockerfile: microservice-couchbase-springdata-java/Dockerfile
    container_name: ms-couchbase-springdata-java
    restart: unless-stopped
    environment:
      COUCHBASE_HOST: couchbase
      COUCHBASE_USER: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka
      TPCH_DATA_PATH: /data/tpch-data-small
    ports:
      - "8087:8087"
    depends_on:
      couchbase:
        condition: service_healthy
      eureka-server:
        condition: service_started
      microservice-couchbase-springdata-java-loader:
        condition: service_completed_successfully

  orchestrator:
    build: ./orchestrator
    container_name: orchestrator
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8100:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      VITE_ORCHESTRATOR_API_URL: http://orchestrator:8080
    ports:
      - "3000:80"

volumes:
  mysql_data:
  mongodb_data:
  couchbase_data:
