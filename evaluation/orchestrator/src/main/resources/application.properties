# Application configuration
spring.application.name=orchestrator
server.port=8080

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JMH runs all iterations inside a single HTTP call.
# Heavy queries (A1, C-series) with 100 reps can take several minutes.
spring.cloud.openfeign.client.config.default.read-timeout=600000
spring.cloud.openfeign.client.config.default.connect-timeout=10000